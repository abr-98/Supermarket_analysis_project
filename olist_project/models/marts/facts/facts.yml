version: 2

models:
  - name: fact_orders
    columns:

        - name: order_id
          tests:
            - unique
            - not_null

        - name: customer_key
          tests:
            - not_null

            - relationships:
                to: ref('dim_customer')
                field: customer_key

        - name: date_key
          tests:
            - relationships:
                to: ref('dim_date')
                field: date_key

  - name: fact_order_items
    columns:

        - name: customer_key
          tests:
            - relationships:
                to: ref('dim_customer')
                field: customer_key

        - name: seller_key
          tests:
            - relationships:
                to: ref('dim_seller')
                field: seller_key

        - name: product_category_key
          tests:
            - relationships:
                to: ref('dim_product_category')
                field: product_category_key