version: 2

models:
  - name: dim_customer

    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_seller

    columns:
      - name: seller_key
        tests:
          - unique
          - not_null

      - name: seller_id
        tests:
          - unique
          - not_null

  - name: dim_date

    columns:
      - name: date_key
        tests:
          - unique
          - not_null